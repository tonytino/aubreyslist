name: CI

on:
  push:
    branches: ["main"]
  pull_request:

# Least privilege: this workflow only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: Lint, Type, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # pnpm version comes from `packageManager` in package.json
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint & format check
        run: pnpm exec biome check .

      - name: Validate changelog fragments
        run: pnpm changelog:check

      - name: Type check
        run: pnpm typecheck

      - name: Unused dependency check
        run: pnpm knip

      # Fast, DB-free unit/component pass. Exclude the integration suite: it
      # self-skips without TEST_DATABASE_URL, but we run it in its own gated
      # step below (see "Integration tests") so excluding it here avoids
      # double-discovering the suite on the fast path.
      - name: Unit tests
        run: pnpm exec vitest run --exclude 'tests/integration/**'

      # The `secrets` context is not allowed in step-level `if` conditions, so we
      # detect the optional E2E secret here and gate later steps on this output.
      # The same secret feeds both the integration suite (TEST_DATABASE_URL) and
      # the E2E steps (DATABASE_URL).
      - name: Check for E2E database secret
        id: e2e
        env:
          E2E_DATABASE_URL: ${{ secrets.CI_E2E_DATABASE_URL }}
        run: |
          if [ -n "$E2E_DATABASE_URL" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          fi

      # DB-level integration suite (issue #92, wired in #112; extended in #45).
      # Gated on the same secret as E2E so a missing secret skips this step
      # rather than failing CI (safe default). When the secret is present the
      # suite runs against the persistent CI Neon branch; it applies migrations
      # itself and cleans up its own per-run fixtures (see the suite header and
      # docs/agents/testing.md).
      #
      # Two env vars, both the same CI Neon branch (STEP-level only — the fast
      # unit step stays DB-free):
      #  - TEST_DATABASE_URL: read directly by suites that build their own pg
      #    client (e.g. schema-constraints.test.ts).
      #  - DATABASE_URL: required by suites that exercise the REAL app server fns,
      #    which go through `getDb()` → `getEnv()` (e.g. the #45 incident-date
      #    round-trip test calling `listIncidents`).
      - name: Integration tests
        if: steps.e2e.outputs.enabled == 'true'
        run: pnpm exec vitest run tests/integration
        env:
          TEST_DATABASE_URL: ${{ secrets.CI_E2E_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.CI_E2E_DATABASE_URL }}

      - name: Install Playwright browsers
        if: steps.e2e.outputs.enabled == 'true'
        run: pnpm test:e2e:install

      # Apply migrations before E2E so DB-touching features (auth is the first)
      # run against an up-to-date schema. Gated on the same secret as the E2E
      # steps. NOTE: the CI Neon branch is persistent (state accumulates across
      # runs), so DB-touching E2E tests must manage their own data — see
      # docs/agents/testing.md.
      - name: Apply database migrations
        if: steps.e2e.outputs.enabled == 'true'
        run: pnpm db:migrate
        env:
          DATABASE_URL: ${{ secrets.CI_E2E_DATABASE_URL }}

      # The E2E suite includes authenticated + DB-seeded flows (issue #45). Those
      # specs seed via Drizzle and mint a sealed session cookie with the repo's
      # own `sealSessionPayload`, so BOTH the spec process AND the Playwright dev
      # server (`pnpm dev`) need the SAME `SESSION_SECRET` (to seal vs. unseal the
      # cookie) plus `DATABASE_URL`. The auth/DB specs self-skip when either is
      # absent (see tests/e2e/fixtures.ts → E2E_DB_READY), so this stays green if
      # only the DB secret is configured. `SESSION_SECRET` falls back to a fixed
      # CI-only test value (it protects nothing real on the throwaway CI branch)
      # when the optional `CI_E2E_SESSION_SECRET` secret is unset.
      - name: E2E tests
        if: steps.e2e.outputs.enabled == 'true'
        run: pnpm test:e2e
        env:
          DATABASE_URL: ${{ secrets.CI_E2E_DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.CI_E2E_SESSION_SECRET || 'e2e-ci-only-session-secret-not-a-real-key' }}

  build-smoke:
    name: Production build smoke
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # pnpm version comes from `packageManager` in package.json
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # Serve the production build and smoke-test it. `pnpm dev` can't catch
      # build-only breakage (e.g. a stylesheet referenced by source path, or a
      # missing ?url asset import), so we assert the served HTML returns 200 and
      # that its stylesheet asset actually resolves. No database required.
      - name: Smoke-test the production server
        run: |
          pnpm start &
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000 >/dev/null 2>&1 && break
            sleep 1
          done
          HTML=$(curl -fsS http://localhost:3000) || { echo "::error::Homepage did not return 200 from the production server"; exit 1; }
          CSS=$(printf '%s' "$HTML" | grep -oE '/[^"]*\.css' | head -1)
          if [ -z "$CSS" ]; then
            echo "::error::No stylesheet <link> found in served HTML"
            exit 1
          fi
          echo "Stylesheet: $CSS"
          curl -fsS "http://localhost:3000$CSS" -o /dev/null || { echo "::error::Stylesheet asset $CSS did not resolve (production asset path broken)"; exit 1; }
          echo "✓ Production build serves the homepage (200) and the stylesheet resolves"
          # Guard app hydration: the served HTML MUST reference the built client
          # entry — a `<script type="module">` that import()s a hashed client
          # bundle under /_build/assets/. Without it, app/client.tsx's hydrateRoot
          # never runs and the app ships as a no-JS site (no voting, forms, filter,
          # sort, or SPA nav). This regresses silently if getRouterManifest stops
          # being wired into createStartHandler (app/ssr.tsx) — the SSR'd HTML and
          # CSS still look fine, which is exactly why the stylesheet check above
          # missed it. We assert the module entry tag AND that the bundle resolves.
          if ! printf '%s' "$HTML" | grep -qE '<script[^>]*type="module"'; then
            echo "::error::No <script type=\"module\"> client entry in served HTML — the app will not hydrate (no-JS site). Check that getRouterManifest is passed to createStartHandler in app/ssr.tsx."
            exit 1
          fi
          CLIENT_JS=$(printf '%s' "$HTML" | grep -oE '/_build/assets/client-[A-Za-z0-9_-]+\.js' | head -1)
          if [ -z "$CLIENT_JS" ]; then
            echo "::error::Served HTML has a module script but no /_build/assets/client-*.js bundle reference — the client entry asset was not surfaced from the router manifest."
            exit 1
          fi
          echo "Client entry: $CLIENT_JS"
          curl -fsS "http://localhost:3000$CLIENT_JS" -o /dev/null || { echo "::error::Client bundle $CLIENT_JS did not resolve (production asset path broken)"; exit 1; }
          echo "✓ Client entry module is injected and the client bundle resolves (app will hydrate)"
          # Guard the API router: /api/* must be served by the Hono handoff in the
          # production build. It silently 404s (falling through to the SSR router)
          # if app/api.ts is missing or API-route generation is off — which is
          # exactly the regression this asserts against. /api/health needs no DB.
          API_CODE=$(curl -s -o /tmp/health.json -w '%{http_code}' http://localhost:3000/api/health)
          if [ "$API_CODE" != "200" ]; then
            echo "::error::/api/health returned $API_CODE (expected 200) — the API router is not served in the production build"
            cat /tmp/health.json 2>/dev/null
            exit 1
          fi
          echo "✓ API router serves /api/health ($(cat /tmp/health.json))"

  changelog-fragment:
    name: Changelog fragment present
    # PRs must add a changelog fragment (see changelog.d/). Exempt: `release/*`
    # branches (a release PR assembles + consumes fragments, it doesn't add one)
    # and any PR carrying the `skip-changelog` label (typo fixes, CI tweaks).
    if: >-
      github.event_name == 'pull_request' &&
      !startsWith(github.head_ref, 'release/') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-changelog')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Require a changelog fragment
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          ADDED=$(git diff --name-only --diff-filter=AM "$BASE_SHA" HEAD -- changelog.d/ \
            | grep -v '^changelog.d/README.md$' || true)
          if [ -z "$ADDED" ]; then
            echo "::error::This PR adds no changelog fragment under changelog.d/. Add a <slug>.<category>.md fragment (see changelog.d/README.md), or apply the 'skip-changelog' label if no changelog entry is warranted."
            exit 1
          fi
          echo "Changelog fragment(s) in this PR:"
          echo "$ADDED"
