name: Security

# Secret scanning, dependency-vulnerability scanning, and a license allowlist.
# SAST (CodeQL) lives in its own workflow (.github/workflows/codeql.yml) because
# it needs `security-events: write` and a weekly schedule — keeping it separate
# lets this workflow stay locked to the least privilege each job actually needs.
#
# Every third-party action below is pinned to a commit SHA with a trailing
# `# vX.Y.Z` comment (repo convention — see ci.yml). The checkout / pnpm / node
# SHAs are copied verbatim from ci.yml.
on:
  push:
    branches: ["main"]
  pull_request:

# Default to no permissions; each job opts into exactly what it needs.
permissions: {}

# Cancel superseded runs on the same ref (matches ci.yml).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Secret scanning — gitleaks. Fails the job on ANY finding (the action exits
  # non-zero when leaks are detected). gitleaks-action v2 is free for user
  # accounts (only GitHub *Organizations* need a GITLEAKS_LICENSE); this repo is
  # under a user account, so no license is set. `fetch-depth: 0` is required so
  # gitleaks can scan the full commit history of the push/PR range, not just the
  # tip commit.
  # ---------------------------------------------------------------------------
  gitleaks:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Dependency vulnerabilities — osv-scanner. Scans pnpm-lock.yaml against the
  # OSV database and HARD-FAILS on any known vulnerability (osv-scanner exits
  # non-zero when vulns are found; that propagates out of the Docker action and
  # fails the job). We pin the *sub-action* (…/osv-scanner-action) rather than
  # the reusable workflow so this stays a normal job in this workflow with
  # least-privilege `contents: read` — the reusable workflow additionally wants
  # `security-events: write` to upload SARIF, which we don't need for a plain
  # pass/fail gate. `-L pnpm-lock.yaml` targets the lockfile explicitly.
  # ---------------------------------------------------------------------------
  osv-scanner:
    name: Dependency vulns (osv-scanner)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: google/osv-scanner-action/osv-scanner-action@9bb69575e74019c2ad085a1860787043adf47ccb # v2.2.4
        with:
          scan-args: |-
            --lockfile=pnpm-lock.yaml

  # ---------------------------------------------------------------------------
  # License allowlist — zero-dep. Runs `pnpm licenses list --json`, parses it,
  # and fails if any installed dependency carries a license OUTSIDE an explicit
  # permissive allowlist (see .github/scripts/check-licenses.mjs). Copyleft or
  # unknown licenses are surfaced as `::error::` annotations naming the offending
  # package + license for human review.
  # ---------------------------------------------------------------------------
  license-allowlist:
    name: License allowlist
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # pnpm version comes from `packageManager` in package.json
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check dependency licenses against the allowlist
        run: node .github/scripts/check-licenses.mjs
