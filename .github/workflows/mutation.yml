name: Mutation testing

# Mutation testing on the trust-critical modules (issue #187, part of #178).
# Diff-coverage proves changed lines EXECUTE; this proves the tests would CATCH
# a bug. It is scoped to the highest-stakes pure logic, so we only run it when
# one of those modules actually changes (the `paths` filter below) — plus a
# manual trigger for ad-hoc runs and ratchet checks. Stryker exits non-zero when
# the mutation score drops below `thresholds.break` in stryker.conf.json, which
# hard-fails this job.
on:
  pull_request:
    paths:
      - "app/trust/**"
      - "app/server/listings/dedup.ts"
      - "app/server/rate-limit/**"
      # Re-run when the gate itself or its inputs change.
      - "stryker.conf.json"
      - ".github/workflows/mutation.yml"
  workflow_dispatch:

# Least privilege: this workflow only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mutation:
    name: Mutation score (trust-critical modules)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # pnpm version comes from `packageManager` in package.json
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Runs `stryker run` (stryker.conf.json). Exits non-zero — and so fails
      # this job — when the mutation score falls below `thresholds.break`.
      - name: Mutation tests
        run: pnpm test:mutation
