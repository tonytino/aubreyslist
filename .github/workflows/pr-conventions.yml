name: PR conventions

# Enforces the PR-level conventions (Conventional Commit title + required
# labels). These live in their own workflow — separate from ci.yml — because
# they must react to events ci.yml does not care about: `edited` (the author
# fixed the PR title) and `labeled`/`unlabeled` (the author added the required
# labels after opening). With the default pull_request trigger these checks
# would run once at open, before labels exist, and never re-evaluate.
on:
  pull_request:
    types: [opened, edited, reopened, synchronize, labeled, unlabeled]

# Least privilege: only needs to read the repo.
permissions:
  contents: read

# Cancel superseded runs for the same PR (e.g. rapid label/title edits).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-title:
    name: Conventional PR title
    # Squash-merge promotes the PR title to the commit message, so the title
    # itself must be a valid Conventional Commit. commitlint enforces the same
    # rules as the local commit-msg hook (commitlint.config.mjs).
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # pnpm version comes from `packageManager` in package.json
      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Pass the title via env (not inline ${{ }}) to avoid shell injection via
      # an attacker-controlled PR title.
      - name: Lint PR title with commitlint
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: printf '%s' "$PR_TITLE" | pnpm exec commitlint

  pr-labels:
    name: Required PR labels
    # Every PR must carry one each of type:*, size:*, and safe:*.
    runs-on: ubuntu-latest

    steps:
      - name: Require type / size / safe labels
        # Wrap the joined label list in delimiting commas and match a ',<prefix>:'
        # boundary so an unrelated label that merely contains the prefix as a
        # substring (e.g. a hypothetical `subtype:x`) can't satisfy the gate.
        env:
          HAS_TYPE: ${{ contains(format(',{0},', join(github.event.pull_request.labels.*.name, ',')), ',type:') }}
          HAS_SIZE: ${{ contains(format(',{0},', join(github.event.pull_request.labels.*.name, ',')), ',size:') }}
          HAS_SAFE: ${{ contains(format(',{0},', join(github.event.pull_request.labels.*.name, ',')), ',safe:') }}
        run: |
          MISSING=""
          [ "$HAS_TYPE" = "true" ] || MISSING="$MISSING type:*"
          [ "$HAS_SIZE" = "true" ] || MISSING="$MISSING size:*"
          [ "$HAS_SAFE" = "true" ] || MISSING="$MISSING safe:*"
          if [ -n "$MISSING" ]; then
            echo "::error::This PR is missing required label(s):$MISSING. Every PR needs at least one each of type:*, size:*, and safe:* (see docs/agents/tasks.md → Label Reference)."
            exit 1
          fi
          echo "✓ PR carries type:*, size:*, and safe:* labels"

  adversarial-review:
    name: Adversarial review gate
    # Enforces the 2-round adversarial review loop in docs/agents/orchestration.md.
    # This re-evaluates on `labeled`/`unlabeled` (author added the gate label) and
    # `edited` (author pasted the verdict into the body) thanks to the triggers above.
    #
    # `skip-review` bypasses the gate (trivial / human-only change). Otherwise BOTH
    # must hold: the `review:adversarial-passed` label is present AND the PR body
    # contains a well-formed review record (validated by check-review-block.mjs).
    runs-on: ubuntu-latest

    steps:
      # Same delimiting-comma boundary technique as pr-labels: wrap the joined
      # label list in commas so a label that merely contains the name as a
      # substring can't satisfy the gate.
      - name: Short-circuit when skip-review is present
        env:
          HAS_SKIP: ${{ contains(format(',{0},', join(github.event.pull_request.labels.*.name, ',')), ',skip-review,') }}
        run: |
          if [ "$HAS_SKIP" = "true" ]; then
            echo "✓ skip-review label present — adversarial-review gate bypassed (trivial/human-only change)."
            echo "SKIP=true" >> "$GITHUB_ENV"
          else
            echo "SKIP=false" >> "$GITHUB_ENV"
          fi

      - name: Require the review:adversarial-passed label
        if: env.SKIP != 'true'
        env:
          HAS_REVIEWED: ${{ contains(format(',{0},', join(github.event.pull_request.labels.*.name, ',')), ',review:adversarial-passed,') }}
        run: |
          if [ "$HAS_REVIEWED" != "true" ]; then
            echo "::error::Missing the \`review:adversarial-passed\` label. Run the 2-round adversarial review loop, then apply the label — or apply \`skip-review\` for a trivial/human-only change (see docs/agents/orchestration.md)."
            exit 1
          fi
          echo "✓ review:adversarial-passed label present"

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: env.SKIP != 'true'

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        if: env.SKIP != 'true'

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: env.SKIP != 'true'
        with:
          node-version-file: .nvmrc
          cache: "pnpm"

      - name: Install dependencies
        if: env.SKIP != 'true'
        run: pnpm install --frozen-lockfile

      # Pass the body via env (not inline ${{ }}) to avoid shell injection via an
      # attacker-controlled PR body — exactly like pr-title passes the title.
      - name: Validate the adversarial-review block in the PR body
        if: env.SKIP != 'true'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: node .github/scripts/check-review-block.mjs
